<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background sky -->
  <rect width="100" height="100" rx="22" fill="url(#sky)"/>

  <!-- Deep water fill -->
  <rect y="52" width="100" height="48" rx="0" fill="url(#water)" clip-path="url(#round)"/>

  <!-- Back wave (lighter) -->
  <path d="M-5 58 Q10 48 25 56 Q40 64 55 54 Q70 44 85 54 Q95 60 105 52 L105 75 L-5 75 Z"
        fill="#38bdf8" opacity="0.55"/>

  <!-- Front wave (white crest) -->
  <path d="M-5 66 Q8 56 22 64 Q36 72 50 62 Q64 52 78 62 Q90 70 105 60 L105 100 L-5 100 Z"
        fill="#e0f2fe" opacity="0.85"/>

  <!-- Glint on water -->
  <ellipse cx="30" cy="59" rx="7" ry="1.5" fill="white" opacity="0.35"/>
  <ellipse cx="68" cy="64" rx="5" ry="1.2" fill="white" opacity="0.3"/>
</svg>
